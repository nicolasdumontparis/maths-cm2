<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problème Maths CM2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #ffd700; text-align: center; font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #a0a0a0; text-align: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .problem-box { background: #fff8e1; border: 3px solid #ffb300; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .problem-text { font-size: 1.2rem; line-height: 2; color: #333; }
        .problem-text p { margin-bottom: 20px; }
        .question { background: #e3f2fd; padding: 20px; border-radius: 15px; margin: 15px 0; border-left: 5px solid #2196f3; }
        .question strong { color: #1565c0; }
        .question input { width: 100%; padding: 12px; font-size: 1.1rem; border: 3px solid #2196f3; border-radius: 10px; margin-top: 10px; }
        .answer-section { background: #f3e5f5; border: 3px solid #9c27b0; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .answer-section h3 { color: #7b1fa2; margin-bottom: 15px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin: 5px; transition: transform 0.2s; }
        button:hover { transform: translateY(-3px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .check-btn { background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); }
        .new-btn { background: linear-gradient(135deg, #ff9800 0%, #e65100 100%); }
        .timer { background: linear-gradient(135deg, #f44336 0%, #c62828 100%); color: white; padding: 15px 30px; border-radius: 50px; font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: 20px; display: inline-block; }
        .timer-container { text-align: center; margin-bottom: 20px; }
        .result { display: none; padding: 20px; border-radius: 15px; text-align: left; font-size: 1.1rem; margin-top: 15px; }
        .result.correct { display: block; background: #c8e6c9; border: 3px solid #4caf50; color: #2e7d32; }
        .result.incorrect { display: block; background: #ffcdd2; border: 3px solid #f44336; color: #c62828; }
        .result.thinking { display: block; background: #fff3e0; border: 3px solid #ff9800; color: #e65100; }
        .score-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .score-display h2 { font-size: 3rem; margin: 10px 0; }
        .controls { text-align: center; margin-top: 20px; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-box h2 { color: #333; margin-bottom: 20px; }
        .main-content { display: none; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 4px solid #ff9800; border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Mot de passe</h2>
            <input type="password" id="password" placeholder="Entrez le mot de passe">
            <br><br>
            <button onclick="doLogin()">OK</button>
        </div>
    </div>
    
    <div id="mainContent" class="main-content">
        <div class="container">
            <h1>🧮 Problème Maths CM2</h1>
            <p class="subtitle">30 minutes de réflexion !</p>
            
            <div class="timer-container">
                <div class="timer" id="timer">30:00</div>
            </div>
            
            <div class="card">
                <div class="problem-box">
                    <div class="problem-text" id="problemText">
                        <div class="loading">
                            <div class="spinner"></div>
                            L'IA génère un problème...
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card answer-section">
                <h3>📝 Réponds à chaque question :</h3>
                <div id="answersContainer"></div>
                <br>
                <button class="check-btn" onclick="checkWithAI()" id="verifyBtn">🤖 Vérifier mes réponses</button>
                <div class="result" id="result"></div>
            </div>
            
            <div class="score-display" id="scoreDisplay" style="display:none;">
                <h2 id="scoreText"></h2>
            </div>
            
            <div class="controls">
                <button class="new-btn" onclick="generateNewProblem()" id="newBtn">🔄 Nouveau problème (IA)</button>
            </div>
        </div>
    </div>

    <script>
        var currentProblem = null;
        var timeLeft = 30 * 60;
        var isGenerating = false;
        
        function doLogin() {
            var pwd = document.getElementById('password').value;
            if (pwd === 'babinou') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                generateNewProblem();
            } else {
                alert('Mot de passe incorrect');
            }
        }
        
        async function generateNewProblem() {
            if (isGenerating) return;
            isGenerating = true;
            
            document.getElementById('newBtn').disabled = true;
            document.getElementById('problemText').innerHTML = '<div class="loading"><div class="spinner"></div>L\'IA génère un problème...</div>';
            document.getElementById('answersContainer').innerHTML = '';
            document.getElementById('result').style.display = 'none';
            document.getElementById('scoreDisplay').style.display = 'none';
            
            var prompt = `Génère un problème de maths pour un élève de CM2 (10-11 ans) avec UN SEUL contexte (une petite histoire) et 5 questions progressives. 

Le contexte doit être concret et amusant (anniversaire, voyage, courses, ferme, etc.)

Chaque question doit être plus difficile que la précédente.

À la fin, indique clairement quelle est la réponse finale attendue pour la Question 5.

Format EXACT à suivre (très important):

---
CONTEXTE: [Petite histoire amusante]

Question 1: [question simple]
Question 2: [question un peu plus dure]
Question 3: [question encore plus dure]
Question 4: [question difficile]
Question 5: [la plus difficile]

RÉPONSE FINALE: [Le nombre exact de la Question 5]
---`;
            
            try {
                var response = await fetch('https://api.minimax.chat/v1/text/chatcompletion_pro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c'
                    },
                    body: JSON.stringify({
                        model: 'MiniMax-M2.5',
                        messages: [
                            {role: 'system', content: 'Tu es un professeur de maths pour enfants de CM2. Tu génères des problèmes de maths stimulants et amusants.'},
                            {role: 'user', content: prompt}
                        ],
                        temperature: 0.9
                    })
                });
                
                var data = await response.json();
                var aiText = data.choices?.[0]?.message?.content || '';
                
                // Parse the response
                var lines = aiText.split('\n');
                var context = '';
                var questions = [];
                var finalAnswer = '';
                
                var currentSection = '';
                lines.forEach(function(line) {
                    line = line.trim();
                    if (line.startsWith('CONTEXTE:')) {
                        currentSection = 'contexte';
                        context = line.replace('CONTEXTE:', '').trim();
                    } else if (line.startsWith('Question')) {
                        currentSection = 'question';
                        questions.push(line);
                    } else if (line.startsWith('RÉPONSE FINALE:') || line.startsWith('RÉPONSE:')) {
                        currentSection = 'answer';
                        finalAnswer = line.replace(/RÉPONSE FINALE:|RÉPONSE:/i, '').trim();
                    } else if (currentSection === 'contexte' && line) {
                        context += ' ' + line;
                    }
                });
                
                // Extract numbers from final answer
                var numbers = finalAnswer.match(/\d+/);
                var answerNum = numbers ? parseInt(numbers[0]) : 0;
                
                // Build HTML
                var html = '<p><strong>📖 ' + context + '</strong></p>';
                questions.forEach(function(q, i) {
                    html += '<div class="question"><strong>' + q + '</strong><br><input type="number" class="answer-input" data-q="' + (i+1) + '" placeholder="Ta réponse"></div>';
                });
                html += '<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>';
                
                currentProblem = {
                    text: html,
                    answer: answerNum
                };
                
                document.getElementById('problemText').innerHTML = html;
                
            } catch(e) {
                console.error(e);
                document.getElementById('problemText').innerHTML = '<p style="color:red">Erreur de génération. Cliquez sur "Nouveau problème" pour réessayer.</p>';
            }
            
            isGenerating = false;
            document.getElementById('newBtn').disabled = false;
            timeLeft = 30 * 60;
            startTimer();
        }
        
        function checkWithAI() {
            var inputs = document.querySelectorAll('.answer-input');
            var q5Answer = '';
            
            inputs.forEach(function(input) {
                var q = input.getAttribute('data-q');
                if (q === '5') {
                    q5Answer = input.value;
                }
            });
            
            var resultDiv = document.getElementById('result');
            var scoreDiv = document.getElementById('scoreDisplay');
            
            if (!q5Answer.trim()) {
                alert('Réponds à la Question 5 !');
                return;
            }
            
            resultDiv.className = 'result thinking';
            resultDiv.innerHTML = '⏳ Vérification en cours...';
            
            setTimeout(function() {
                var numbers = q5Answer.match(/\d+/g);
                var isCorrect = false;
                
                if (numbers && currentProblem && numbers.indexOf(currentProblem.answer.toString()) !== -1) {
                    isCorrect = true;
                }
                
                if (isCorrect) {
                    resultDiv.className = 'result correct';
                    resultDiv.innerHTML = '✅ <strong>Bravo ! C\'est correct !</strong><br><br>La réponse à la Question 5 était bien: ' + currentProblem.answer;
                    document.getElementById('scoreText').textContent = '✅ Excellent !';
                } else {
                    resultDiv.className = 'result incorrect';
                    resultDiv.innerHTML = '❌ <strong>Pas tout à fait...</strong><br><br>La bonne réponse à la Question 5 était: ' + (currentProblem ? currentProblem.answer : '?') + '<br><br>Mais continue, tu vas y arriver !';
                    document.getElementById('scoreText').textContent = '❌ Réessaie';
                }
                
                scoreDiv.style.display = 'block';
            }, 1000);
        }
        
        function startTimer() {
            setInterval(function() {
                if (timeLeft > 0) {
                    timeLeft--;
                    var m = Math.floor(timeLeft / 60);
                    var s = timeLeft % 60;
                    document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
                }
            }, 1000);
        }
    </script>
</body>
</html>
