<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problème Maths CM2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #ffd700; text-align: center; font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #a0a0a0; text-align: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .problem-box { background: #fff8e1; border: 3px solid #ffb300; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .problem-text { font-size: 1.15rem; line-height: 1.8; color: #333; }
        .problem-text p { margin-bottom: 15px; }
        .answer-section { background: #f3e5f5; border: 3px solid #9c27b0; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .answer-section h3 { color: #7b1fa2; margin-bottom: 15px; }
        input[type="text"], input[type="password"] { width: 100%; max-width: 500px; padding: 15px; font-size: 1.1rem; border: 3px solid #9c27b0; border-radius: 10px; text-align: center; margin-bottom: 10px; }
        textarea { width: 100%; max-width: 500px; padding: 15px; font-size: 1.1rem; border: 3px solid #9c27b0; border-radius: 10px; margin-bottom: 10px; min-height: 100px; font-family: inherit; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin: 5px; transition: transform 0.2s; }
        button:hover { transform: translateY(-3px); }
        button:disabled { opacity: 0.6; }
        .check-btn { background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); }
        .new-btn { background: linear-gradient(135deg, #ff9800 0%, #e65100 100%); }
        .print-btn { background: linear-gradient(135deg, #2196f3 0%, #1565c0 100%); }
        .timer { background: linear-gradient(135deg, #f44336 0%, #c62828 100%); color: white; padding: 20px 40px; border-radius: 50px; font-size: 2rem; font-weight: bold; text-align: center; margin-bottom: 20px; display: inline-block; }
        .timer-container { text-align: center; margin-bottom: 20px; }
        .result { display: none; padding: 20px; border-radius: 15px; text-align: left; font-size: 1.1rem; margin-top: 15px; white-space: pre-wrap; }
        .result.correct { display: block; background: #c8e6c9; border: 3px solid #4caf50; color: #2e7d32; }
        .result.incorrect { display: block; background: #ffcdd2; border: 3px solid #f44336; color: #c62828; }
        .result.thinking { display: block; background: #fff3e0; border: 3px solid #ff9800; color: #e65100; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #ff9800; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .score-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .score-display h2 { font-size: 3rem; margin: 10px 0; }
        .controls { text-align: center; margin-top: 20px; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-box h2 { color: #333; margin-bottom: 20px; }
        .main-content { display: none; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Mot de passe</h2>
            <input type="password" id="password" placeholder="babinou">
            <br><br>
            <button onclick="doLogin()">OK</button>
        </div>
    </div>
    
    <div id="mainContent" class="main-content">
        <div class="container">
            <h1>🧮 Problème Maths CM2</h1>
            <p class="subtitle">30 minutes de réflexion !</p>
            
            <div class="timer-container">
                <div class="timer" id="timer">30:00</div>
            </div>
            
            <div class="card">
                <div class="problem-box">
                    <div class="problem-text" id="problemText">Chargement...</div>
                </div>
            </div>
            
            <div class="card answer-section">
                <h3>📝 Ta réponse</h3>
                <textarea id="userAnswer" placeholder="Écris ta réponse ici..."></textarea>
                <br><br>
                <button class="check-btn" onclick="checkWithAI()" id="verifyBtn">🤖 Vérifier</button>
                <div class="result" id="result"></div>
            </div>
            
            <div class="score-display" id="scoreDisplay" style="display:none;">
                <h2 id="scoreText"></h2>
            </div>
            
            <div class="controls">
                <button class="new-btn" onclick="generateNewProblem()">🔄 Nouveau problème</button>
            </div>
        </div>
    </div>

    <script>
        var problems = [
            {text:"<p><strong>Contexte :</strong> La famille Dupont organise un anniversaire. Il y a 8 invités et la famille (4 personnes).</p><p><strong>Questions :</strong></p><p>1. Gâteau: 250g farine, 200g sucre, 150g beurre (pour 6 personnes). <strong>Pour 12 personnes ?</strong></p><p>2. Chaque invité mange 2 parts. <strong>Combien de parts ?</strong></p><p>3. Gâteau coûte 15€. <strong>Prix par personne ?</strong></p><p>4. Soda: 2€50 la bouteille, 1 pour 3 personnes. <strong>Prix total ?</strong></p><p>5. 5 enfants invités, 1 balloon à 1€ chacun. <strong>Prix total ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:5},
            {text:"<p><strong>Contexte :</strong> Voyage en train. Départ 8h15, arrivée 14h45.</p><p><strong>Questions :</strong></p><p>1. <strong>Durée du voyage ?</strong></p><p>2. Billet: 45€ adulte, demi-tarif enfant. Luc + 2 enfants. <strong>Prix total ?</strong></p><p>3. 6 wagons de 50 places. 120 personnes montent. <strong>Places libres ?</strong></p><p>4. 35 descendent, 28 montent. <strong>Voyageurs dans le train ?</strong></p><p>5. Journal 3€50, café 2€50. Paye avec 20€. <strong>Rendu ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:14},
            {text:"<p><strong>Contexte :</strong> Soldes! Livre 25€, jeu 60€, jouet 15€.</p><p><strong>Questions :</strong></p><p>1. 3 livres + 2 jeux. <strong>Prix ?</strong></p><p>2. -20% sur livres. <strong>Prix des 3 livres soldés ?</strong></p><p>3. 100€ + 4 jouets. <strong>Manque ?</strong></p><p>4. Marie paie moins 15€ grâce aux soldes. <strong>Prix total ?</strong></p><p>5. 5 amis à 12€ pour un cadeau de 55€. <strong>Reste ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:5},
            {text:"<p><strong>Contexte :</strong> Fermier: Ferme1=45 moutons. Ferme2=double Ferme1. Ferme3=30 de moins que Ferme2.</p><p><strong>Questions :</strong></p><p>1. <strong>Moutons Ferme2 ?</strong></p><p>2. <strong>Moutons Ferme3 ?</strong></p><p>3. <strong>Total moutons ?</strong></p><p>4. Vend 60 moutons. <strong>Reste ?</strong></p><p>5. Mouton = 80€. <strong>Argent vente 60 moutons ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:4800},
            {text:"<p><strong>Contexte :</strong> Classe: 24 élèves + 3 maîtres. Car: 60 places.</p><p><strong>Questions :</strong></p><p>1. <strong>Places libres ?</strong></p><p>2. Trajet 2h15. <strong>En minutes ?</strong></p><p>3. Prix 35€ par élève. <strong>Total 24 élèves ?</strong></p><p>4. Maîtres gratuit. <strong>Recette ?</strong></p><p>5. Subventions 200€ + 150€. <strong>Manque ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:390},
            {text:"<p><strong>Contexte :</strong> Sophie: 125 cartes Pokemon.</p><p><strong>Questions :</strong></p><p>1. +10 cartes/semaine pendant 4 semaines. <strong>Total ?</strong></p><p>2. Échange 25 cartes contre 1 rare. <strong>Reste ?</strong></p><p>3. Vend 30 cartes à 2€. <strong>Argent ?</strong></p><p>4. Achète 3 albums à 12€. <strong>Dépense totale ?</strong></p><p>5. Il reste 155€. <strong>Somme départ ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:233},
            {text:"<p><strong>Contexte :</strong> Maraîcher: 100kg tomates à 3€/kg.</p><p><strong>Questions :</strong></p><p>1. <strong>Valeur tomates ?</strong></p><p>2. +50kg pommes de terre à 2€/kg. <strong>Valeur ?</strong></p><p>3. <strong>Total gagné ?</strong></p><p>4. -20€ emplacement. <strong>Reste ?</strong></p><p>5. Verse sur compte (450€). <strong>Nouveau solde ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:720},
            {text:"<p><strong>Contexte :</strong> Lapin: 3 portées/an, 6 lapereaux/portée.</p><p><strong>Questions :</strong></p><p>1. <strong>Lapereaux/an ?</strong></p><p>2. Moitié femelles. <strong>Nombre ?</strong></p><p>3. 200g/jour. <strong>Kg/semaine ?</strong></p><p>4. Nourriture 2€/kg. <strong>Prix/semaine ?</strong></p><p>5. Vend 30 à 15€. <strong>Argent ?</strong></p><p><em>Réponse finale: question 5</em></p>",answer:450}
        ];
        
        var currentProblem = null;
        var timeLeft = 30 * 60;
        
        function doLogin() {
            var pwd = document.getElementById('password').value;
            if (pwd === 'babinou') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                generateNewProblem();
            } else {
                alert('Mot de passe: babinou');
            }
        }
        
        function generateNewProblem() {
            currentProblem = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('problemText').innerHTML = currentProblem.text;
            document.getElementById('userAnswer').value = '';
            document.getElementById('result').style.display = 'none';
            document.getElementById('scoreDisplay').style.display = 'none';
            timeLeft = 30 * 60;
            startTimer();
        }
        
        function checkWithAI() {
            var userAnswer = document.getElementById('userAnswer').value;
            var resultDiv = document.getElementById('result');
            var scoreDiv = document.getElementById('scoreDisplay');
            
            if (!userAnswer.trim()) {
                alert('Écris ta réponse d\'abord!');
                return;
            }
            
            resultDiv.className = 'result thinking';
            resultDiv.innerHTML = '⏳ L\'IA vérifie...';
            
            // Smart local checking
            setTimeout(function() {
                var numbers = userAnswer.match(/\d+/g);
                var isCorrect = false;
                
                if (numbers && numbers.indexOf(currentProblem.answer.toString()) !== -1) {
                    isCorrect = true;
                }
                
                if (isCorrect) {
                    resultDiv.className = 'result correct';
                    resultDiv.innerHTML = '✅ <strong>Bravo ! C\'est correct !</strong>\n\nLa réponse attendue était: ' + currentProblem.answer;
                    document.getElementById('scoreText').textContent = '✅ Correct !';
                } else {
                    resultDiv.className = 'result incorrect';
                    resultDiv.innerHTML = '❌ <strong>Pas tout à fait...</strong>\n\nLa bonne réponse était: ' + currentProblem.answer + '\n\nMais continue, c\'est en forgeant qu\'on devient forgeron !';
                    document.getElementById('scoreText').textContent = '❌ Essaie encore';
                }
                
                scoreDiv.style.display = 'block';
            }, 1500);
        }
        
        function startTimer() {
            setInterval(function() {
                if (timeLeft > 0) {
                    timeLeft--;
                    var m = Math.floor(timeLeft / 60);
                    var s = timeLeft % 60;
                    document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
                }
            }, 1000);
        }
    </script>
</body>
</html>
