<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problème Maths CM2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #ffd700; text-align: center; font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #a0a0a0; text-align: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .problem-box { background: #fff8e1; border: 3px solid #ffb300; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .problem-text { font-size: 1.2rem; line-height: 2; color: #333; }
        .problem-text p { margin-bottom: 20px; }
        .question { background: #e3f2fd; padding: 20px; border-radius: 15px; margin: 15px 0; border-left: 5px solid #2196f3; }
        .question strong { color: #1565c0; }
        .question input { width: 100%; padding: 12px; font-size: 1.1rem; border: 3px solid #2196f3; border-radius: 10px; margin-top: 10px; }
        .answer-section { background: #f3e5f5; border: 3px solid #9c27b0; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .answer-section h3 { color: #7b1fa2; margin-bottom: 15px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin: 5px; transition: transform 0.2s; }
        button:hover { transform: translateY(-3px); }
        .check-btn { background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); }
        .new-btn { background: linear-gradient(135deg, #ff9800 0%, #e65100 100%); }
        .timer { background: linear-gradient(135deg, #f44336 0%, #c62828 100%); color: white; padding: 15px 30px; border-radius: 50px; font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: 20px; display: inline-block; }
        .timer-container { text-align: center; margin-bottom: 20px; }
        .result { display: none; padding: 20px; border-radius: 15px; text-align: left; font-size: 1.1rem; margin-top: 15px; }
        .result.correct { display: block; background: #c8e6c9; border: 3px solid #4caf50; color: #2e7d32; }
        .result.incorrect { display: block; background: #ffcdd2; border: 3px solid #f44336; color: #c62828; }
        .result.thinking { display: block; background: #fff3e0; border: 3px solid #ff9800; color: #e65100; }
        .score-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .score-display h2 { font-size: 3rem; margin: 10px 0; }
        .controls { text-align: center; margin-top: 20px; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-box h2 { color: #333; margin-bottom: 20px; }
        .main-content { display: none; }
        .hint { background: #fff3e0; border: 2px dashed #ff9800; padding: 15px; border-radius: 10px; margin-top: 15px; font-style: italic; color: #e65100; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Mot de passe</h2>
            <input type="password" id="password" placeholder="Entrez le mot de passe">
            <br><br>
            <button onclick="doLogin()">OK</button>
        </div>
    </div>
    
    <div id="mainContent" class="main-content">
        <div class="container">
            <h1>🧮 Problème Maths CM2</h1>
            <p class="subtitle">30 minutes de réflexion !</p>
            
            <div class="timer-container">
                <div class="timer" id="timer">30:00</div>
            </div>
            
            <div class="card">
                <div class="problem-box">
                    <div class="problem-text" id="problemText">Chargement...</div>
                </div>
            </div>
            
            <div class="card answer-section">
                <h3>📝 Réponds à chaque question :</h3>
                <div id="answersContainer"></div>
                <br>
                <button class="check-btn" onclick="checkWithAI()" id="verifyBtn">🤖 Vérifier toutes mes réponses</button>
                <div class="result" id="result"></div>
            </div>
            
            <div class="score-display" id="scoreDisplay" style="display:none;">
                <h2 id="scoreText"></h2>
            </div>
            
            <div class="controls">
                <button class="new-btn" onclick="generateNewProblem()">🔄 Changer de problème</button>
            </div>
        </div>
    </div>

    <script>
        var problems = [
            {
                text: `<p><strong>📖 L'histoire :</strong> La famille Dupont prépare l'anniversaire. Il y a <strong>8 invités</strong> + la famille (père, mère, 2 enfants = 4 personnes).</p>

<div class="question"><strong>Question 1 :</strong> Gâteau : 250g farine, 200g sucre, 150g beurre pour 6 personnes.<br>➡️ <strong>Quantité pour 12 personnes ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Chaque invité mange 2 parts.<br>➡️ <strong>Combien de parts au total ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> Gâteau coûte 15€.<br>➡️ <strong>Prix par personne ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Soda 2€50, 1 bouteille pour 3 personnes.<br>➡️ <strong>Prix total ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> 5 enfants invités, 1 balloon à 1€.<br>➡️ <strong>Prix total ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 5}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Voyage en train. Départ 8h15, arrivée 14h45. Adulte 45€, enfant demi-tarif.</p>

<div class="question"><strong>Question 1 :</strong> Durée du voyage ?<br><input type="number" class="answer-input" data-q="1" placeholder="En minutes"></div>

<div class="question"><strong>Question 2 :</strong> Père + 2 enfants (demi-tarif).<br>➡️ <strong>Prix total ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> 6 wagons × 50 places. 120 personnes montent.<br>➡️ <strong>Places libres ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> 35 descendent, 28 montent.<br>➡️ <strong>Voyageurs dans le train ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Journal 3€50, café 2€50. Paye 20€.<br>➡️ <strong>Rendu ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 14}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Soldes ! Livre 25€, Jeu 60€, Jouet 15€.</p>

<div class="question"><strong>Question 1 :</strong> 3 livres + 2 jeux.<br>➡️ <strong>Prix normal ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> -20% sur les livres.<br>➡️ <strong>Prix soldés des 3 livres ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> 100€ + 4 jouets.<br>➡️ <strong>Manque ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Marie économise 15€ grâce aux soldes.<br>➡️ <strong>Prix total (livres + jeux) ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> 5 amis × 12€ pour un cadeau de 55€.<br>➡️ <strong>Reste ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 5}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Fermier : Ferme1 = 45 moutons. Ferme2 = double Ferme1. Ferme3 = 30 de moins que Ferme2.</p>

<div class="question"><strong>Question 1 :</strong> Ferme2 ?<br><input type="number" class="answer-input" data-q="1" placeholder="Nombre de moutons"></div>

<div class="question"><strong>Question 2 :</strong> Ferme3 ?<br><input type="number" class="answer-input" data-q="2" placeholder="Nombre de moutons"></div>

<div class="question"><strong>Question 3 :</strong> Total des 3 fermes ?<br><input type="number" class="answer-input" data-q="3" placeholder="Nombre de moutons"></div>

<div class="question"><strong>Question 4 :</strong> Vend 60 moutons.<br>➡️ <strong>Reste ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Nombre de moutons"></div>

<div class="question"><strong>Question 5 :</strong> Mouton = 80€.<br>➡️ <strong>Argent vente 60 moutons ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="En euros"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 4800}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Classe CM2 : 24 élèves + 3 maîtres. Car : 60 places.</p>

<div class="question"><strong>Question 1 :</strong> Places libres ?<br><input type="number" class="answer-input" data-q="1" placeholder="Nombre de places"></div>

<div class="question"><strong>Question 2 :</strong> Trajet 2h15.<br>➡️ <strong>En minutes ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Minutes"></div>

<div class="question"><strong>Question 3 :</strong> 35€ par élève.<br>➡️ <strong>Total 24 élèves ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="En euros"></div>

<div class="question"><strong>Question 4 :</strong> Maîtres gratuit.<br>➡️ <strong>Recette totale ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="En euros"></div>

<div class="question"><strong>Question 5 :</strong> Subventions 200€ + 150€.<br>➡️ <strong>Manque ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="En euros"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 390}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Sophie : 125 cartes Pokemon.</p>

<div class="question"><strong>Question 1 :</strong> +10 cartes/semaine × 4 semaines.<br>➡️ <strong>Total ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Nombre de cartes"></div>

<div class="question"><strong>Question 2 :</strong> Échange 25 cartes contre 1 rare.<br>➡️ <strong>Reste ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Nombre de cartes"></div>

<div class="question"><strong>Question 3 :</strong> Vend 30 cartes à 2€.<br>➡️ <strong>Argent ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="En euros"></div>

<div class="question"><strong>Question 4 :</strong> Achète 3 albums à 12€.<br>➡️ <strong>Dépense ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="En euros"></div>

<div class="question"><strong>Question 5 :</strong> Il reste 155€.<br>➡️ <strong>Somme de départ ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="En euros"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 233}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Maraîcher : 100kg tomates à 3€/kg.</p>

<div class="question"><strong>Question 1 :</strong> Valeur tomates ?<br><input type="number" class="answer-input" data-q="1" placeholder="En euros"></div>

<div class="question"><strong>Question 2 :</strong> +50kg pommes de terre à 2€/kg.<br>➡️ <strong>Valeur ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="En euros"></div>

<div class="question"><strong>Question 3 :</strong> Total gagné ?<br><input type="number" class="answer-input" data-q="3" placeholder="En euros"></div>

<div class="question"><strong>Question 4 :</strong> -20€ emplacement.<br>➡️ <strong>Reste ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="En euros"></div>

<div class="question"><strong>Question 5 :</strong> Verse sur compte (450€ avant).<br>➡️ <strong>Nouveau solde ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="En euros"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 720}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Lapin : 3 portées/an, 6 lapereaux/portée.</p>

<div class="question"><strong>Question 1 :</strong> Lapereaux/an ?<br><input type="number" class="answer-input" data-q="1" placeholder="Nombre"></div>

<div class="question"><strong>Question 2 :</strong> Moitié femelles.<br>➡️ <strong>Nombre ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Nombre"></div>

<div class="question"><strong>Question 3 :</strong> 200g/jour × 7 jours.<br>➡️ <strong>Kg/semaine ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Kg"></div>

<div class="question"><strong>Question 4 :</strong> Nourriture 2€/kg.<br>➡️ <strong>Prix/semaine ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="En euros"></div>

<div class="question"><strong>Question 5 :</strong> Vend 30 à 15€.<br>➡️ <strong>Argent ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="En euros"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 450}
            }
        ];
        
        var currentProblem = null;
        var timeLeft = 30 * 60;
        
        function doLogin() {
            var pwd = document.getElementById('password').value;
            if (pwd === 'babinou') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                generateNewProblem();
            } else {
                alert('Mot de passe incorrect');
            }
        }
        
        function generateNewProblem() {
            currentProblem = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('problemText').innerHTML = currentProblem.text;
            document.getElementById('result').style.display = 'none';
            document.getElementById('scoreDisplay').style.display = 'none';
            timeLeft = 30 * 60;
            startTimer();
        }
        
        function checkWithAI() {
            var inputs = document.querySelectorAll('.answer-input');
            var userAnswer = '';
            var q5Answer = '';
            
            inputs.forEach(function(input) {
                var q = input.getAttribute('data-q');
                if (q === '5') {
                    q5Answer = input.value;
                }
                userAnswer += 'Q' + q + ': ' + input.value + '\n';
            });
            
            var resultDiv = document.getElementById('result');
            var scoreDiv = document.getElementById('scoreDisplay');
            
            if (!q5Answer.trim()) {
                alert('Réponds au moins à la Question 5 !');
                return;
            }
            
            resultDiv.className = 'result thinking';
            resultDiv.innerHTML = '⏳ Vérification en cours...';
            
            setTimeout(function() {
                var numbers = q5Answer.match(/\d+/g);
                var isCorrect = false;
                
                if (numbers && numbers.indexOf(currentProblem.answers[5].toString()) !== -1) {
                    isCorrect = true;
                }
                
                if (isCorrect) {
                    resultDiv.className = 'result correct';
                    resultDiv.innerHTML = '✅ <strong>Bravo ! C\'est correct !</strong><br><br>La réponse à la Question 5 était bien: ' + currentProblem.answers[5];
                    document.getElementById('scoreText').textContent = '✅ Excellent !';
                } else {
                    resultDiv.className = 'result incorrect';
                    resultDiv.innerHTML = '❌ <strong>Pas tout à fait...</strong><br><br>La bonne réponse à la Question 5 était: ' + currentProblem.answers[5] + '<br><br>Mais continue, tu vas y arriver !';
                    document.getElementById('scoreText').textContent = '❌ Réessaie';
                }
                
                scoreDiv.style.display = 'block';
            }, 1000);
        }
        
        function startTimer() {
            setInterval(function() {
                if (timeLeft > 0) {
                    timeLeft--;
                    var m = Math.floor(timeLeft / 60);
                    var s = timeLeft % 60;
                    document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
                }
            }, 1000);
        }
    </script>
</body>
</html>
