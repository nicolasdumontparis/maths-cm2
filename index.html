<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problème Maths CM2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Comic Sans MS', 'Chalkboard', sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #ffd700; text-align: center; font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #a0a0a0; text-align: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .problem-box { background: #fff8e1; border: 3px solid #ffb300; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .problem-text { font-size: 1.15rem; line-height: 1.8; color: #333; }
        .problem-text p { margin-bottom: 15px; }
        .question { background: #e3f2fd; padding: 18px; border-radius: 12px; margin: 12px 0; border-left: 5px solid #2196f3; }
        .question strong { color: #1565c0; }
        .question input { width: 100%; padding: 12px; font-size: 1.1rem; border: 3px solid #2196f3; border-radius: 8px; margin-top: 8px; }
        .answer-section { background: #f3e5f5; border: 3px solid #9c27b0; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .answer-section h3 { color: #7b1fa2; margin-bottom: 15px; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin: 5px; transition: transform 0.2s; }
        button:hover { transform: translateY(-3px); }
        button:disabled { opacity: 0.6; }
        .check-btn { background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); }
        .new-btn { background: linear-gradient(135deg, #ff9800 0%, #e65100 100%); }
        .timer { background: linear-gradient(135deg, #f44336 0%, #c62828 100%); color: white; padding: 15px 30px; border-radius: 50px; font-size: 1.8rem; font-weight: bold; text-align: center; margin-bottom: 20px; display: inline-block; }
        .timer-container { text-align: center; margin-bottom: 20px; }
        .result { display: none; padding: 20px; border-radius: 15px; text-align: left; font-size: 1.1rem; margin-top: 15px; }
        .result.correct { display: block; background: #c8e6c9; border: 3px solid #4caf50; color: #2e7d32; }
        .result.incorrect { display: block; background: #ffcdd2; border: 3px solid #f44336; color: #c62828; }
        .score-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .score-display h2 { font-size: 3rem; margin: 10px 0; }
        .controls { text-align: center; margin-top: 20px; }
        .login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .login-box h2 { color: #333; margin-bottom: 20px; }
        .main-content { display: none; }
        .hint { background: #fff3e0; border: 2px dashed #ff9800; padding: 12px; border-radius: 8px; margin-top: 12px; font-style: italic; color: #e65100; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Mot de passe</h2>
            <input type="password" id="password" placeholder="Entrez le mot de passe">
            <br><br>
            <button onclick="doLogin()">OK</button>
        </div>
    </div>
    
    <div id="mainContent" class="main-content">
        <div class="container">
            <h1>🧮 Problème Maths CM2</h1>
            <p class="subtitle">30 minutes de réflexion !</p>
            
            <div class="timer-container">
                <div class="timer" id="timer">30:00</div>
            </div>
            
            <div class="card">
                <div class="problem-box">
                    <div class="problem-text" id="problemText">Chargement...</div>
                </div>
            </div>
            
            <div class="card answer-section">
                <h3>📝 Réponds à chaque question :</h3>
                <div id="answersContainer"></div>
                <br>
                <button class="check-btn" onclick="checkWithAI()">🤖 Vérifier mes réponses</button>
                <div class="result" id="result"></div>
            </div>
            
            <div class="score-display" id="scoreDisplay" style="display:none;">
                <h2 id="scoreText"></h2>
            </div>
            
            <div class="controls">
                <button class="new-btn" onclick="generateNewProblem()">🔄 Nouveau problème</button>
            </div>
        </div>
    </div>

    <script>
        var problems = [
            {
                text: `<p><strong>📖 L'histoire :</strong> La famille Martin organise un超级 pique-nique pour l'anniversaire de Emma. Il y a <strong>12 enfants</strong> et <strong>6 adultes</strong>.</p>

<div class="question"><strong>Question 1 :</strong> Chaque enfant mange <strong>2 sandwiches</strong> et chaque adulte en mange <strong>3</strong>.<br>➡️ <strong>Combien de sandwiches sont mangés au total ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Ils apportent <strong>48 cupcakes</strong> à partager équitablement entre les 12 enfants.<br>➡️ <strong>Combien de cupcakes par enfant ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> Les cupcakes coûtent <strong>1€50</strong> chacun.<br>➡️ <strong>Combien coûtent les 48 cupcakes ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Ils achètent aussi des jus de fruits à <strong>2€</strong> la bouteille. Il en faut <strong>1 pour 3 personnes</strong>.<br>➡️ <strong>Combien de bouteilles et quel prix total ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Nombre de bouteilles"></div>

<div class="question"><strong>Question 5 :</strong> Chaque enfant reçoit <strong>3 ballons</strong> à <strong>0€50</strong> le ballon.<br>➡️ <strong>Combien coûtent tous les ballons ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse en euros"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong> (le prix des ballons)</div>`,
                answers: {5: 18}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Tom fait un长 voyage en train pour aller chez son oncle. Le trajet总长 3h30min.</p>

<div class="question"><strong>Question 1 :</strong> Le train part à <strong>9h15</strong>.<br>➡️ <strong>À quelle heure arrive-t-il ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Heure d'arrivée"></div>

<div class="question"><strong>Question 2 :</strong> Le billet adulte coûte <strong>52€</strong> et Tom (enfant) paie demi-tarif.<br>➡️ <strong>Combien payent-ils à eux deux ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> Dans le wagon, il y a <strong>8_RANGEES</strong> de 6 sièges chacune. <strong>15 personnes</strong> sont assises.<br>➡️ <strong>Combien de places libres ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Tom achète un livre à <strong>12€</strong> et un jeu à <strong>18€</strong>.<br>➡️ <strong>Combien a-t-il dépensé ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Il avait <strong>100€</strong> dans sa tirelire. Après le voyage et ses achats, il lui reste <strong>15€</strong>.<br>➡️ <strong>Combien a-t-il dépensé au total ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 85}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> La ferme de Monsieur Dubois a des animaux. Il a <strong>45 vaches</strong>, <strong>28 poules</strong> et <strong>12 moutons</strong>.</p>

<div class="question"><strong>Question 1 :</strong> Combien y a-t-il d'animaux en tout ?<br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Chaque vache donne <strong>25 litres</strong> de lait par jour.<br>➡️ <strong>Combien de litres par jour pour toutes les vaches ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> Le lait est vendu à <strong>0€80</strong> le litre.<br>➡️ <strong>Combien gagne-t-il par jour avec le lait ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Il vend <strong>8 moutons</strong> à <strong>120€</strong> chacun.<br>➡️ <strong>Combien reçoit-il ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Avec tout cet argent, il achète un tracteur à <strong>4500€</strong>.<br>➡️ <strong>Combien lui manque-t-il s'il a déjà 3000€ ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 1500}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Léa fait des courses au supermarché. Un panier coûte <strong>25€</strong>, un jeu <strong>38€</strong> et un livre <strong>15€</strong>.</p>

<div class="question"><strong>Question 1 :</strong> Elle achète <strong>2 paniers</strong>, <strong>1 jeu</strong> et <strong>3 livres</strong>.<br>➡️ <strong>Combien va-t-elle payer ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Elle donne un billet de <strong>200€</strong>.<br>➡️ <strong>Combien lui rendent-ils ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> Elle perd <strong>15€</strong> en rentrant.<br>➡️ <strong>Combien lui reste-t-il ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Avec ce qui lui reste, elle veut acheter des CD à <strong>12€</strong> chacun.<br>➡️ <strong>Combien de CD peut-elle acheter ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Il lui reste <strong>2€</strong> après l'achat des CD.<br>➡️ <strong>Combien de CD a-t-elle achetés ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 3}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Unebibliothèque achète des livres. Ils coûtent <strong>18€</strong> chacun.</p>

<div class="question"><strong>Question 1 :</strong> Ils achètent <strong>25 livres</strong> pour la section enfants.<br>➡️ <strong>Combien ça coûte ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Ils achètent aussi <strong>15 livres</strong> pour les adultes.<br>➡️ <strong>Combien ça coûte ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> <strong>Ensemble</strong>, combien ont-ils dépensé ?<br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Ils reçoivent une réduction de <strong>100€</strong> sur le total.<br>➡️ <strong>Combien payent-ils ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Ils partagent le paiement en <strong>4 mensualités égales</strong>.<br>➡️ <strong>Combien par mensualité ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 110}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Un pizzeria vend des pizzas. Une pizza familiale coûte <strong>16€</strong> et une petite pizza coûte <strong>9€</strong>.</p>

<div class="question"><strong>Question 1 :</strong> Aujourd'hui, ils vendent <strong>18 familiales</strong> et <strong>12 petites</strong>.<br>➡️ <strong>Combien hanno vendu en tout ?</strong><br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Combien ont-ils gagné avec les familiales ?<br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> Et avec les petites ?<br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> <strong>Total</strong> de la journée ?<br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Ils doivent payer <strong>120€</strong> de ingredients et <strong>80€</strong> de loyer.<br>➡️ <strong>Combien leur reste-t-il de bénéfice ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 184}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Max organise une fête. Il invite <strong>15 amis</strong>. Chaque ami apporte <strong>3 gateaux</strong>.</p>

<div class="question"><strong>Question 1 :</strong> Combien de gateaux apportent les amis ?<br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Max ajoute aussi <strong>12 gateaux</strong> de sa grand-mère.<br>➡️ <strong>Combien de gateaux en tout ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> <strong>8 enfants</strong> mangent chacun <strong>3 gateaux</strong>.<br>➡️ <strong>Combien de gateaux sont mangés ?</strong><br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> <strong>7 adultes</strong> mangent chacun <strong>2 gateaux</strong>.<br>➡️ <strong>Combien de gateaux par les adultes ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> <strong>Total mangé = enfants + adultes</strong>. Combien reste-t-il ?<br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 12}
            },
            {
                text: `<p><strong>📖 L'histoire :</strong> Un maraîcher vend au marché. Il apporte <strong>80 kg de carottes</strong> à <strong>2€ le kg</strong>.</p>

<div class="question"><strong>Question 1 :</strong> Combien vaut la récolte de carottes ?<br><input type="number" class="answer-input" data-q="1" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 2 :</strong> Il vend aussi <strong>50 kg de navets</strong> à <strong>1€50 le kg</strong>.<br>➡️ <strong>Combien ça fait ?</strong><br><input type="number" class="answer-input" data-q="2" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 3 :</strong> <strong>Total</strong> gagné ?<br><input type="number" class="answer-input" data-q="3" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 4 :</strong> Il doit payer <strong>35€</strong> pour l'emplacement et <strong>20€</strong> de transport.<br>➡️ <strong>Combien paye-t-il ?</strong><br><input type="number" class="answer-input" data-q="4" placeholder="Ta réponse"></div>

<div class="question"><strong>Question 5 :</strong> Il met le reste sur son compte qui avait <strong>200€</strong>.<br>➡️ <strong>Nouveau solde ?</strong><br><input type="number" class="answer-input" data-q="5" placeholder="Ta réponse"></div>

<div class="hint">💡 La réponse finale est la <strong>Question 5</strong></div>`,
                answers: {5: 365}
            }
        ];
        
        var currentProblem = null;
        var timeLeft = 30 * 60;
        
        function doLogin() {
            var pwd = document.getElementById('password').value;
            if (pwd === 'babinou') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                generateNewProblem();
            } else {
                alert('Mot de passe incorrect');
            }
        }
        
        function generateNewProblem() {
            currentProblem = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('problemText').innerHTML = currentProblem.text;
            document.getElementById('result').style.display = 'none';
            document.getElementById('scoreDisplay').style.display = 'none';
            timeLeft = 30 * 60;
            startTimer();
        }
        
        function checkWithAI() {
            var inputs = document.querySelectorAll('.answer-input');
            var q5Answer = '';
            
            inputs.forEach(function(input) {
                var q = input.getAttribute('data-q');
                if (q === '5') {
                    q5Answer = input.value;
                }
            });
            
            var resultDiv = document.getElementById('result');
            var scoreDiv = document.getElementById('scoreDisplay');
            
            if (!q5Answer.trim()) {
                alert('Réponds à la Question 5 !');
                return;
            }
            
            resultDiv.className = 'result';
            resultDiv.innerHTML = '⏳ Vérification en cours...';
            
            setTimeout(function() {
                var numbers = q5Answer.match(/\d+/g);
                var isCorrect = false;
                
                if (numbers && currentProblem && numbers.indexOf(currentProblem.answers[5].toString()) !== -1) {
                    isCorrect = true;
                }
                
                if (isCorrect) {
                    resultDiv.className = 'result correct';
                    resultDiv.innerHTML = '✅ <strong>Bravo ! C\'est correct !</strong><br><br>La réponse à la Question 5 était bien: ' + currentProblem.answers[5];
                    document.getElementById('scoreText').textContent = '✅ Excellent !';
                } else {
                    resultDiv.className = 'result incorrect';
                    resultDiv.innerHTML = '❌ <strong>Pas tout à fait...</strong><br><br>La bonne réponse à la Question 5 était: ' + (currentProblem ? currentProblem.answers[5] : '?') + '<br><br>Mais continue, tu vas y arriver !';
                    document.getElementById('scoreText').textContent = '❌ Réessaie';
                }
                
                scoreDiv.style.display = 'block';
            }, 1000);
        }
        
        function startTimer() {
            setInterval(function() {
                if (timeLeft > 0) {
                    timeLeft--;
                    var m = Math.floor(timeLeft / 60);
                    var s = timeLeft % 60;
                    document.getElementById('timer').textContent = m + ':' + (s < 10 ? '0' : '') + s;
                }
            }, 1000);
        }
    </script>
</body>
</html>
