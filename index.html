<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths CM2 - 30 minutes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #ffd700;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            color: #a0a0a0;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        button.print-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .problems-list {
            display: none;
        }
        
        .problems-list.visible {
            display: block;
        }
        
        .problem {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 0 15px 15px 0;
            position: relative;
        }
        
        .problem-number {
            position: absolute;
            top: -10px;
            left: -10px;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .problem-title {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .problem-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .problem-answer {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            padding: 10px 15px;
            border-radius: 10px;
            color: #2e7d32;
            font-weight: bold;
            display: inline-block;
        }
        
        .hidden-answers .problem-answer {
            background: #fff3e0;
            border-color: #ff9800;
            color: #e65100;
        }
        
        .hidden-answers .problem-answer::before {
            content: "👉 ";
        }
        
        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .stats h3 {
            margin-bottom: 10px;
        }
        
        .timer {
            font-size: 2rem;
            font-weight: bold;
        }
        
        @media print {
            body {
                background: white;
                padding: 0;
            }
            
            .controls, .timer {
                display: none;
            }
            
            .card {
                box-shadow: none;
                page-break-inside: avoid;
            }
            
            .problem {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Maths CM2</h1>
        <p class="subtitle">Problèmes pour 30 minutes de travail</p>
        
        <div class="stats">
            <h3>⏱️ Durée estimée : 30 minutes</h3>
            <div class="timer" id="timer">30:00</div>
            <p id="problemCount">12 problèmes</p>
        </div>
        
        <div class="controls">
            <button onclick="generateProblems()">🔄 Générer de nouveaux problèmes</button>
            <button class="secondary" onclick="toggleAnswers()">👁️ Afficher/Masquer les réponses</button>
            <button class="print-btn" onclick="window.print()">🖨️ Imprimer</button>
        </div>
        
        <div class="card">
            <div class="problems-list" id="problemsList"></div>
        </div>
    </div>

    <script>
        const operations = [
            {
                title: "Addition",
                generate: () => {
                    const a = Math.floor(Math.random() * 9000) + 1000;
                    const b = Math.floor(Math.random() * 9000) + 1000;
                    return {
                        content: `${a.toLocaleString()} + ${b.toLocaleString()} = ?`,
                        answer: (a + b).toLocaleString()
                    };
                }
            },
            {
                title: "Soustraction",
                generate: () => {
                    const a = Math.floor(Math.random() * 9000) + 5000;
                    const b = Math.floor(Math.random() * 4000) + 1000;
                    return {
                        content: `${a.toLocaleString()} - ${b.toLocaleString()} = ?`,
                        answer: (a - b).toLocaleString()
                    };
                }
            },
            {
                title: "Multiplication",
                generate: () => {
                    const a = Math.floor(Math.random() * 90) + 10;
                    const b = Math.floor(Math.random() * 90) + 10;
                    return {
                        content: `${a} × ${b} = ?`,
                        answer: (a * b).toLocaleString()
                    };
                }
            },
            {
                title: "Division",
                generate: () => {
                    const b = Math.floor(Math.random() * 12) + 2;
                    const q = Math.floor(Math.random() * 40) + 5;
                    const a = b * q;
                    return {
                        content: `${a.toLocaleString()} ÷ ${b} = ?`,
                        answer: q.toLocaleString()
                    };
                }
            }
        ];
        
        const problems = [
            {
                title: "Problème d'achat",
                generate: () => {
                    const prix = Math.floor(Math.random() * 50) + 10;
                    const qte = Math.floor(Math.random() * 8) + 2;
                    const articles = ["cahiers", "stylos", "livres", "crayons", "gommes"];
                    const article = articles[Math.floor(Math.random() * articles.length)];
                    return {
                        content: `Léa achète ${qte} ${article} à ${prix}€ l'un. Combien paie-t-elle ?`,
                        answer: (prix * qte) + "€"
                    };
                }
            },
            {
                title: "Problème de distance",
                generate: () => {
                    const vitesse = Math.floor(Math.random() * 60) + 40;
                    const temps = Math.floor(Math.random() * 3) + 2;
                    return {
                        content: `Une voiture roule à ${vitesse} km/h pendant ${temps} heures. Quelle distance parcourt-elle ?`,
                        answer: (vitesse * temps) + " km"
                    };
                }
            },
            {
                title: "Problème de partage",
                generate: () => {
                    const total = (Math.floor(Math.random() * 20) + 10) * 6;
                    const parts = Math.floor(Math.random() * 5) + 3;
                    return {
                        content: `On distribue ${total} bonbons à ${parts} enfants de manière égale. Combien de bonbons reçoit chaque enfant ?`,
                        answer: (total / parts) + " bonbons"
                    };
                }
            },
            {
                title: "Problème de temps",
                generate: () => {
                    const debut = Math.floor(Math.random() * 8) + 8;
                    const duree = Math.floor(Math.random() * 180) + 30;
                    const fin = debut * 60 + duree;
                    const h = Math.floor(fin / 60);
                    const m = fin % 60;
                    return {
                        content: `Un train part à ${debut}h et le voyage dure ${duree} minutes. À quelle heure arrive-t-il ?`,
                        answer: `${h}h${m.toString().padStart(2, '0')}`
                    };
                }
            },
            {
                title: "Problème d'argent",
                generate: () => {
                    const avoir = Math.floor(Math.random() * 100) + 50;
                    const depense = Math.floor(Math.random() * 30) + 10;
                    return {
                        content: `Thomas a ${avoir}€ et il dépense ${depense}€. Combien lui reste-t-il ?`,
                        answer: (avoir - depense) + "€"
                    };
                }
            },
            {
                title: "Problème decollection",
                generate: () => {
                    const a = Math.floor(Math.random() * 500) + 100;
                    const b = Math.floor(Math.random() * 300) + 50;
                    return {
                        content: `Marc a ${a} timbres dans son album. Il en reçoit ${b} de son grand-père. Combien a-t-il de timbres maintenant ?`,
                        answer: (a + b) + " timbres"
                    };
                }
            },
            {
                title: "Problème de périmètre",
                generate: () => {
                    const c = Math.floor(Math.random() * 15) + 5;
                    return {
                        content: `Un carré mesure ${c} cm de côté. Calcule son périmètre.`,
                        answer: (c * 4) + " cm"
                    };
                }
            },
            {
                title: "Problème de surface",
                generate: () => {
                    const L = Math.floor(Math.random() * 10) + 5;
                    const l = Math.floor(Math.random() * 6) + 3;
                    return {
                        content: `Un rectangle mesure ${L} cm de longueur et ${l} cm de largeur. Calcule son aire.`,
                        answer: (L * l) + " cm²"
                    };
                }
            }
        ];
        
        let currentProblems = [];
        
        function generateProblems() {
            currentProblems = [];
            const list = document.getElementById('problemsList');
            list.innerHTML = '';
            list.classList.add('visible');
            
            // Generate 6 operations
            for (let i = 0; i < 6; i++) {
                const op = operations[Math.floor(Math.random() * operations.length)];
                const p = op.generate();
                currentProblems.push({ title: op.title, ...p });
            }
            
            // Generate 6 word problems
            for (let i = 0; i < 6; i++) {
                const pb = problems[Math.floor(Math.random() * problems.length)];
                const p = pb.generate();
                currentProblems.push({ title: pb.title, ...p });
            }
            
            // Shuffle
            currentProblems.sort(() => Math.random() - 0.5);
            
            // Render
            currentProblems.forEach((p, i) => {
                list.innerHTML += `
                    <div class="problem">
                        <div class="problem-number">${i + 1}</div>
                        <div class="problem-title">${p.title}</div>
                        <div class="problem-content">${p.content}</div>
                        <div class="problem-answer">${p.answer}</div>
                    </div>
                `;
            });
            
            document.getElementById('problemCount').textContent = currentProblems.length + " problèmes";
        }
        
        function toggleAnswers() {
            const list = document.getElementById('problemsList');
            list.classList.toggle('hidden-answers');
        }
        
        // Start timer
        let timeLeft = 30 * 60;
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${m}:${s.toString().padStart(2, '0')}`;
            }
        }, 1000);
        
        // Generate on load
        generateProblems();
    </script>
</body>
</html>
